services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-timetracker}
      MYSQL_USER: ${DB_USERNAME:-timetracker}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${APP_UID:-1000}
        GID: ${APP_GID:-1000}
    volumes:
      - ./backend:/var/www
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE:-timetracker}
      DB_USERNAME: ${DB_USERNAME:-timetracker}
      DB_PASSWORD: ${DB_PASSWORD:-secret}

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  node:
    image: node:20-alpine
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "5173:5173"
    networks:
      - app-network
    depends_on:
      - app
    # Waits for the Laravel project to be created before starting Vite
    command: sh -c "until [ -f package.json ]; do sleep 2; done && npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
